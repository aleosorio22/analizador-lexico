<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Cuerpo del chip (compilador) -->
  <rect x="8" y="8" width="16" height="16" rx="2.5" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Pines izquierda (entrada: código fuente) -->
  <line x1="2.5" y1="12" x2="8"   y2="12" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2.5" y1="16" x2="8"   y2="16" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2.5" y1="20" x2="8"   y2="20" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pines derecha (salida: tokens) -->
  <line x1="24"  y1="12" x2="29.5" y2="12" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24"  y1="16" x2="29.5" y2="16" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24"  y1="20" x2="29.5" y2="20" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Símbolo </> dentro del chip -->
  <text
    x="16" y="19.5"
    text-anchor="middle"
    fill="#e6edf3"
    font-family="'Courier New', monospace"
    font-size="7.5"
    font-weight="700"
    letter-spacing="-0.5"
  >&lt;/&gt;</text>
</svg>
