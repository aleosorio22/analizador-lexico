name: Deploy to GitHub Pages

on:
  push:
    branches: [main]       # Se ejecuta cada vez que hagas push a main
  workflow_dispatch:        # También permite lanzarlo manualmente desde GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Paso 1: Construir la app ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir la app
        run: npm run build
        env:
          GITHUB_ACTIONS: true   # Le dice a vite.config.js que use el base correcto

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Paso 2: Publicar en GitHub Pages ────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
